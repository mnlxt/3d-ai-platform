version: '3.8'

services:
  # MySQL服务
  mysql:
    image: mysql:8.0
    container_name: 3d-ai-mysql
    restart: always
    ports:
      - "3308:3306"
    environment:
      # 只保留 root 密码设置，删掉冲突的 MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: 3dai2026
      MYSQL_DATABASE: 3d_ai_platform
      MYSQL_INITDB_SKIP_TZINFO: 1
      # 确保使用旧版验证插件以适配当前的 pymysql 库
      MYSQL_AUTH_PLUGIN: mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - 3d-ai-network

  # MongoDB服务
  mongodb:
    image: mongo:5.0
    container_name: 3d-ai-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 3dai2026  # 团队通用密码
      MONGO_INITDB_DATABASE: 3d_ai_metadata
    volumes:
      - mongodb_data:/data/db
    networks:
      - 3d-ai-network

  # MinIO服务
  minio:
    image: minio/minio
    container_name: 3d-ai-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: 3dai2026  # 团队通用密码
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - 3d-ai-network

  # MinIO初始化容器
  minio-init:
    image: minio/mc
    container_name: 3d-ai-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set local http://minio:9000 admin 3dai2026;
      /usr/bin/mc mb --ignore-existing local/3d-ai-assets;
      /usr/bin/mc anonymous set public local/3d-ai-assets;
      exit 0;
      "
    networks:
      - 3d-ai-network

  # Redis服务 (新增！异步任务的核心命脉)
  redis:
    image: redis:7-alpine
    container_name: 3d-ai-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - 3d-ai-network

# 数据卷：持久化存储 (增加了 redis_data)
volumes:
  mysql_data:
  mongodb_data:
  minio_data:
  redis_data:

# 自定义网络：隔离服务
networks:
  3d-ai-network:
    driver: bridge